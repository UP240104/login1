name: SonarCloud
on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    env:
      HEADLESS: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Diagnostico Chrome
        run: |
          echo "--- which ---"
          which google-chrome || echo "google-chrome no encontrado en PATH"
          which google-chrome-stable || echo "google-chrome-stable no encontrado en PATH"
          which chromium-browser || echo "chromium-browser no encontrado en PATH"
          echo "--- busqueda en disco ---"
          find / -iname "*chrome*" -type f 2>/dev/null | grep -v "/proc/" | head -50
      - run: pip install -r requirements.txt pytest-cov
      - run: pytest --cov=pages --cov-report=xml
      - uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}